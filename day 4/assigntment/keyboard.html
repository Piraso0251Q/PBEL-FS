<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#f6b5d0,#ffd6a5,#f6b5d0);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:1000px;
}

h1{
    text-align:center;
    color:#c58b00;
    margin-bottom:20px;
    letter-spacing:2px;
}

.keyboard{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.row{
    display:flex;
    gap:10px;
}

.key{
    width:55px;
    height:50px;
    background:#f6e5df;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
    box-shadow:0 3px 8px rgba(0,0,0,.35);
    border:1px solid #c7a890;
    cursor:pointer;
    user-select:none;
}

.key:hover{
    background:#fff3ef;
    transform:translateY(-2px);
}

.w70{width:70px;}
.w80{width:80px;}
.w90{width:90px;}
.w100{width:100px;}
.w110{width:110px;}
.w120{width:120px;}
.w130{width:130px;}
.w140{width:140px;}
.space{width:370px;}
</style>
</head>

<body>

<div class="container">

<h1>KEYBOARD</h1>

<div class="keyboard">

<!-- Row 1 -->
<div class="row">
<div class="key">Esc</div>
<div class="key">F1</div>
<div class="key">F2</div>
<div class="key">F3</div>
<div class="key">F4</div>
<div class="key">F5</div>
<div class="key">F6</div>
<div class="key">F7</div>
<div class="key">F8</div>
<div class="key">F9</div>
<div class="key">F10</div>
<div class="key">F11</div>
<div class="key">F12</div>
<div class="key">Insert</div>
<div class="key w80">PrintScr</div>
<div class="key">Delete</div>
</div>

<!-- Row 2 -->
<div class="row">
<div class="key">~</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">10</div>
<div class="key">-</div>
<div class="key">=</div>
<div class="key w140">Backspace</div>
<div class="key">Home</div>
</div>

<!-- Row 3 -->
<div class="row">
<div class="key w110">Tab</div>
<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>
<div class="key">{</div>
<div class="key">}</div>
<div class="key">\</div>
<div class="key">Pg Up</div>
</div>

<!-- Row 4 -->
<div class="row">
<div class="key w80">Caps Lock</div>
<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">I</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key">;</div>
<div class="key">"</div>
<div class="key w110">Enter</div>
<div class="key">Pg Dn</div>
</div>

<!-- Row 5 -->
<div class="row">
<div class="key w110">Shift</div>
<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key">&lt;</div>
<div class="key">&gt;</div>
<div class="key">?</div>
<div class="key w100">Shift</div>
<div class="key">↑</div>
<div class="key">End</div>
</div>

<!-- Row 6 -->
<div class="row">
<div class="key">Ctrl</div>
<div class="key">Fn</div>
<div class="key">Win</div>
<div class="key">Alt</div>
<div class="key space">Space</div>
<div class="key">Alt</div>
<div class="key">Fn</div>
<div class="key">Ctrl</div>
<div class="key">←</div>
<div class="key">↓</div>
<div class="key">→</div>
</div>

</div>

</div>

</body>
</html>
